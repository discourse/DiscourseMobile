name: Jest Tests

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: jest-tests-${{ format('{0}-{1}', github.head_ref || github.run_number, github.job) }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: yarn

      - name: Yarn install
        run: yarn

      - name: Jest
        run: yarn unit-test
